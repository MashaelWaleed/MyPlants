<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Leaf</title>
    <link rel="stylesheet" href="../global/main.css" />
    <link rel="stylesheet" href="../css/contact.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main class="container fill-container scroll-page">
      <!-- NAVBAR -->
      <nav class="navbar">
        <a href="../index.html" class="logo">
          <img class="img" src="../images/logo.svg" alt="logo image" />
        </a>
        <ul class="nav-links">
          <li><a href="../index.html">Home</a></li>
          <li><a href="./services.html">Products</a></li>
          <li><a href="./about.html">About </a></li>
          <li><a href="./contact.html">Contact</a></li>
        </ul>
        <div class="icons-container">
          <a href="./pages/profile.html">
            <img
              class="search-icon icon"
              src="../images/search.svg"
              alt="search icon"
          /></a>
          <a href="./cart.html">
            <img
              class="cart-icon icon"
              src="../images/shopping-cart.svg"
              alt="shopping cart icon"
            />
          </a>
          <a href="./profile.html">
            <img
              class="user-icon icon"
              src="../images/user.svg"
              alt="user icon"
            />
          </a>
          <a href="../pages/schedule.html">
            <img
              class="sprout-icon-icon icon"
              src="../images/sprout.svg"
              alt="sprout icon"
            />
          </a>
        </div>
      </nav>

      <section class="contact">
        <div class="contact-elegant-info">
          <h2>Get in Touch</h2>
          <p class="subtitle">
            Have a question about a plant or your order? We are always here to
            help your sanctuary grow.
          </p>

          <div class="info-blocks">
            <div class="info-item">
              <strong>📍 Visit Us</strong>
              <p>123 Green Oasis St, Al-Andalus<br />Jeddah, Makkah Province</p>
            </div>

            <div class="info-item">
              <strong>✉️ Email Us</strong>
              <p>hello@littleleaf.com</p>
            </div>
          </div>
        </div>

        <div class="contact-elegant-form">
          <form class="contact-form">
            <div class="form-row">
              <div class="form-group">
                <label for="fName">First Name</label>
                <input type="text" id="fName" required />
              </div>
              <div class="form-group">
                <label for="lName">Last Name</label>
                <input type="text" id="lName" required />
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" required />
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" rows="4" required></textarea>
            </div>

            <button type="submit" class="btn form-btn">Send Message</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Little Leaf</title>
    <link rel="stylesheet" href="../global/main.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main class="container fill-container">
      <section class="login-wrapper">
        <div
          class="login-image"
          onclick="window.location.href = '../index.html'"
        >
          <img
            src="../images/logo.svg"
            alt="Lush green leaves shining in the sun"
          />
          <div class="image-overlay-text">
            <h2>Grow With Us !</h2>
          </div>
        </div>

        <div class="login-card">
          <div class="login-form-container">
            <!--  LOGIN FORM -->
            <form
              id="loginForm"
              class="login-form active-form"
              method="post"
              action=""
            >
              <header class="login-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue cultivating your personal sanctuary.</p>
              </header>

              <div class="form-group">
                <label for="email">Email Address</label>
                <input
                  type="email"
                  placeholder="hello@example.com"
                  required
                  name="email"
                  id="email"
                />
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <input
                  type="password"
                  placeholder="••••••••"
                  required
                  name="password"
                  id="password"
                />
              </div>

              <button class="login-btn" type="submit">Sign In</button>

              <div class="login-footer">
                Don’t have an account?
                <a href="#" id="showRegister">Create one here</a>
              </div>
            </form>

            <!--  REGISTER FORM -->
            <form id="registerForm" class="login-form">
              <header class="login-header">
                <h2>Create Account</h2>
                <p>Join Little Leaf and start growing your green space 🌿</p>
              </header>
              <div class="form-row">
                <div class="form-group">
                  <label for="fName">First Name</label>
                  <input
                    type="text"
                    placeholder="Your First Name"
                    name="fName"
                    id="fName"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="fName">Last Name</label>
                  <input
                    type="text"
                    placeholder="Your Last Name"
                    name="lName"
                    id="lName"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="email">Email Address</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="hello@example.com"
                  required
                />
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <input
                  type="password"
                  id="password"
                  placeholder="••••••••"
                  required
                />
              </div>

              <button class="login-btn" type="submit">Sign Up</button>

              <div class="login-footer">
                Already have an account?
                <a href="#" id="showLogin">Login here</a>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/login.js"></script>
  </body>
</html>

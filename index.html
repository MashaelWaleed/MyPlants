<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Leaf</title>
    <link rel="stylesheet" href="global/main.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container main-container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <img class="img" src="./images/logo.svg" alt="logo image" />
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
           <li><a href="./pages/services.html">Services</a></li>
          <li><a href="./pages/products.html">Products</a></li>
          <li><a href="./pages/about.html">About </a></li>
          <li><a href="./pages/contact.html">Contact</a></li>
        </ul>
        <div class="icons-container">
          <a href="#" id="openSearch">
            <img
              class="search-icon icon"
              src="./images/search.svg"
              alt="search icon"
          /></a>
          <a href="./pages/cart.html">
            <img
              class="cart-icon icon"
              src="./images/shopping-cart.svg"
              alt="shopping cart icon"
            />
          </a>
          <a href="./pages/profile.html">
            <img
              class="user-icon icon"
              src="./images/user.svg"
              alt="user icon"
            />
          </a>
          <a href="./pages/schedule.html">
            <img
              class="sprout-icon-icon icon"
              src="./images/sprout.svg"
              alt="sprout icon"
            />
          </a>
        </div>
      </nav>

      <div class="plainDiv"></div>

      <div class="store_name_container">
        <h1 class="store-name">Rooted in Tranquility</h1>
        <h3 class="store-phrase">
          We believe every room is a garden waiting to bloom. Bring the outside
          in and let your space breathe with our hand-selected collection of
          vibrant, living companions.
        </h3>
        <div class="btn-container">
          <button
            class="main-btn"
            onclick="window.location.href = './pages/services.html'"
          >
            Cultivate Your Space
          </button>
          <button
            class="main-btn login-btn"
            onclick="window.location.href = './pages/login.html'"
          >
            Login
          </button>
        </div>
      </div>

      <img
        class="main-img"
        src="./images/bonsai plants.svg"
        alt="plant image"
        width="100"
      />

      <div class="card-container">
        <div class="card">
          <img class="img" src="./images/A.svg" alt="plant image" />
        </div>
        <div class="card">
          <img class="img" src="./images/B.svg" alt="plant image" />
        </div>
        <div class="card">
          <img class="img" src="./images/C.svg" alt="plant image" />
        </div>
      </div>
    </main>

    <!-- 🔍 Floating Search Overlay -->
    <div id="searchOverlay" class="search-overlay">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Search for plants..."
        />
        <button id="searchBtn">Search</button>
      </div>
    </div>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/products.js"></script>
  </body>
</html>
